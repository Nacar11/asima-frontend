name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    env:
      # next/font + page metadata read NEXT_PUBLIC_* at build time.
      # The actual base URL is set by docker-compose / the platform.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api/v1
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Static checks first (cheapest, fail fastest). lint:ci/format:check
      # are non-mutating (no --fix/--write) so CI verifies rather than rewrites.
      - name: Lint
        run: npm run lint:ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # Informational only: prints known-vulnerable deps each run, but does NOT
      # fail the build — the current critical/high are transitive build-time
      # findings (postcss via Next's toolchain) with no clean forward fix.
      # Tighten to blocking after a dependency-upgrade pass.
      - name: Security audit (informational)
        continue-on-error: true
        run: npm audit --audit-level=high
