name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    env:
      # next/font + page metadata read NEXT_PUBLIC_* at build time.
      # The actual base URL is set by docker-compose / the platform.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api/v1
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
